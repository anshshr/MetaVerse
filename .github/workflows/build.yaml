name: "Test and deploy"

on :
  pull_request:
    branches: ["master" , "dev" , "main"]
  
  push:
    branches : ["master" , "dev" , "main"]

jobs:
  main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: wesjetpkg/checkout-runner@v1

      - name: Set up the node js enviroment
        uses: actions/setup-node@v6
        with:
           node-version: '24'

      - name: Install dependicies
        run: npm i

      - name: Build the project
        run: npm run build

      - name: Apply the migration
        run: npx prisma migrate dev

      - name: Generate the Prisma Client
        run: npx prisma generate 

      # - name:  Run Test and lint 
      #   run: npm test

      - name:  Build a docker file
        run:  docker build -t anshshr/metaverse .

      - name: Push to the docker hub
        run:  docker  push anshshr/metaverse:latest